name: CI
on:
  push:
    branches: [ci]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-format-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Run lint
        run: pnpm lint:mobile
      - name: Run format check
        run: pnpm format:check-mobile

  lint-format-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Run lint
        run: pnpm lint:web
      - name: Run format check
        run: pnpm format:check-web

  build-android:
    needs: lint-format-mobile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: sed -i 's/# //g' pnpm-workspace.yaml && pnpm install
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Add keys
        run: echo "GOOGLE_MAPS_SDK_API_KEY=$GOOGLE_MAPS_SDK_API_KEY" >> apps/mobile/android/local.properties
      - name: Grant execute permission for gradlew
        run: chmod +x apps/mobile/android/gradlew
      - name: Build debug APK
        run: cd apps/mobile/android && ./gradlew assembleDebug

  build-ios:
    needs: lint-format-mobile
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Install dependencies
        run: |
          cd apps/mobile/ios && pod install --repo-update
      - name: Build iOS app (debug)
        run: |
          cd apps/mobile/ios && xcodebuild build -workspace SureWalk.xcworkspace \
            -scheme SureWalk \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGN_STYLE="Automatic"

  build-web:
    needs: lint-format-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Build web app
        run: cd apps/web && pnpm opennextjs-cloudflare build
